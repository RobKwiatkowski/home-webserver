services:
  backend:
    build:
      context: ./backend
    container_name: home-webserver-backend

  nginx:
    image: nginx:stable
    container_name: home-webserver-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - backend