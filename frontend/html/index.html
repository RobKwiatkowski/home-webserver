<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domowy Notatnik</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="container">
        <header class="page-header">
            <h1>Domowy Notatnik</h1>
            <p class="page-description">Prosty notatnik oparty o FastAPI, PostgreSQL i Nginx.</p>
        </header>

        <section class="card">
            <h2>Dodaj notatkę</h2>

            <form id="note-form">
                <div class="form-group">
                    <label for="title">Tytuł</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="Np. Plan na weekend"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="content">Treść</label>
                    <textarea
                        id="content"
                        name="content"
                        rows="6"
                        placeholder="Wpisz treść notatki..."
                        required
                    ></textarea>
                </div>

                <div class="form-actions">
                    <button id="submit-button" type="submit">Dodaj notatkę</button>
                    <button id="cancel-edit-button" type="button" hidden>Anuluj edycję</button>
                </div>
            </form>

            <p id="status-message" class="status-message"></p>
        </section>

        <section class="card">
            <div class="notes-header">
                <h2>Wszystkie notatki</h2>
                <button id="refresh-button" type="button">Odśwież</button>
            </div>

            <div id="notes-list" class="notes-list"></div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
